<div class="info-box">
  <span class="info-box-icon {{ icon_bg }}"><i class="fa-solid {{ icon }}"></i></span>
  <div class="info-box-content">
    <span class="info-box-text">{{ text }}</span>
    <span class="info-box-number">{{ number }}</span>
    {% if subtext %}
    <span class="info-box-text small">{{ subtext }}</span>
    {% endif %}
  </div>
</div>
