name: Friction logging
description: Use this template to log issues (good, bad and ugly) during sprints and events
labels: ["requires triaging"]
body:
  - type: markdown
    attributes:
      value: |
        More information on friction logging:
        https://devrel.net/developer-experience/an-introduction-to-friction-logging
  - type: input
    id: date-event
    attributes:
      label: Date @ Event
      placeholder: "for example: 5/14/2018 @ PyCon Cleveland Sprints"
    validations:
      required: true
  - type: input
    id: scenario
    attributes:
      label: Scenario
      placeholder: "for example: I'm trying to install pandas"
    validations:
      required: true
  - type: input
    id: os-environment
    attributes:
      label: OS environment
      placeholder: "for example: Windows 10, macOS 10.13, or Ubuntu 18.04"
  - type: input
    id: things-used
    attributes:
      label: Things you used
      placeholder: "for example: pip, warehouse, setuptools, etc..."
  - type: input
    id: python-version
    attributes:
      label: Python version and origin
      placeholder: "for example: Python 3.6.0 from apt"
  - type: checkboxes
    id: legend
    attributes:
      label: Please highlight your log using this legend
      options:
        - label: "😍 Yay, this is awesome"
        - label: "😦 This is a little annoying, I'm frustrated"
        - label: "😡 I'd quit if I weren't specifically trying to improve things."
  - type: textarea
    id: actionable-bugs
    attributes:
      label: Are there any actionable bugs?
      description: If any please link to the bug on GitHub.
  - type: textarea
    id: what-didnt-work
    attributes:
      label: What were you trying to do, and what didn't work?
      description: "For example: I was trying to install pandas on Windows and pip made my cat turn purple"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ideally, what should have happened instead?
      description: Feel free to be blunt!
