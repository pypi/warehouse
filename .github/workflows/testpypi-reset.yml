name: Reset TestPyPI branch to main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: testpypi-deploy
  cancel-in-progress: false

jobs:
  reset:
    name: Sync testpypi branch to main
    if: github.repository == 'pypi/warehouse'
    runs-on: ubuntu-24.04
    permissions:
      contents: write # force-push main to testpypi branch
      pull-requests: read # check for labeled draft PRs
    steps:
      - name: Check for active testpypi deployments
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          count=$(gh pr list \
            --repo "$GH_REPOSITORY" \
            --state open \
            --draft \
            --label "deploy-to-testpypi" \
            --json number \
            --jq 'length')
          echo "active_deployments=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            echo "Skipping reset: $count draft PR(s) with deploy-to-testpypi label"
          else
            echo "No active deployments, will reset testpypi to main"
          fi
      - name: Check out repository
        if: steps.check.outputs.active_deployments == '0'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Force-push main to testpypi
        if: steps.check.outputs.active_deployments == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git -c "http.https://github.com/.extraheader=Authorization: basic $(echo -n "x-access-token:${GH_TOKEN}" | base64)" \
            push origin main:testpypi --force
